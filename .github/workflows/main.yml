name: Build Android APK

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. เปลี่ยนมาใช้ JDK 17 ซึ่งเสถียรที่สุดสำหรับกลุ่ม Gradle 8.x - 9.x และสคริปต์เก่า
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. ปรับลดเวอร์ชัน Gradle ส่วนกลางลงมาที่ 8.5 (หรือ 8.7) เพื่อให้ฟีเจอร์ Custom Task (SettingsBuilder) เวอร์ชันเก่ายังคงทำงานได้ โดยไม่โดนตัดทิ้งเหมือนในเวอร์ชัน 9.3.1
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      # 3. นำเอาคำสั่ง -x generateSettings ออก เพื่อปล่อยให้ระบบสร้างไฟล์ AppSettings ให้สำเร็จ
      - name: Build Debug APK
        run: gradle assembleDebug -x lint --no-build-cache --no-configuration-cache

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RevolutionIRC-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
