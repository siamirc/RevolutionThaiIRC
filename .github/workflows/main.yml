name: Build Android APK

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ตั้งค่า JDK 11 เพื่อให้เข้ากับระบบโครงสร้างเดิมของโปรเจกต์ Revolution IRC
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      # ให้ระบบเรียกใช้ Gradle ตัวเต็มจากส่วนกลาง (ข้ามการหาไฟล์ wrapper ในโปรเจกต์)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.3.3' # ใช้เวอร์ชัน 7.x เพื่อให้เข้ากันได้กับโปรเจกต์แอนดรอยด์ยุคก่อน

      # รันคำสั่งบิวด์ด้วยคำสั่ง 'gradle' ตรงๆ (ไม่ใช้ ./gradlew)
      - name: Build Debug APK
        run: gradle assembleDebug -x lint

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RevolutionIRC-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
