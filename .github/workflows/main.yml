name: Build Android APK

on:
  push:
    branches: [ "master", "main" ] # โปรเจกต์เก่ามักใช้ชื่อสาขาว่า master ตรวจสอบชื่อสาขาของคุณด้วยนะครับ
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # เปลี่ยนมาใช้ JDK 17 (หรือ JDK 11 หากเวอร์ชัน 17 ยังใหม่เกินไปสำหรับโค้ดเก่า)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ให้สิทธิ์การรันไฟล์สคริปต์ Gradle Wrapper
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # สั่ง Build ด้วย Gradle Wrapper แทนการเรียกใช้ 'gradle' ตรงๆ
      # แนะนำให้ใช้คำสั่งอย่างง่ายก่อนเพื่อลดโอกาสเกิดปัญหา Cache ย้อนแย้ง
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RevolutionIRC-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
