name: Build Android APK

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # สั่งติดตั้ง Gradle 9.3.1
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      # ปรับคำสั่งบิวด์: เพิ่ม -x generateSettings เพื่อข้ามขั้นตอนที่มีปัญหาซอฟต์แวร์เก่า-ใหม่ขัดกัน
      - name: Build Debug APK
        run: gradle assembleDebug -x lint -x generateSettings --no-build-cache --no-configuration-cache

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RevolutionIRC-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
