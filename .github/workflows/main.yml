name: Build Android APK

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      # สร้างสคริปต์ดักแก้ปัญหาตัวแปรดั้งเดิมที่โดน Gradle 9 ตัดทิ้ง เพื่อให้บิวด์ผ่านได้
      - name: Create Gradle Fix Script
        run: |
          mkdir -p ~/.gradle
          cat << 'EOF' > ~/.gradle/init.gradle
          allprojects {
              tasks.matching { it.name == 'generateSettings' }.configureEach {
                  doFirst {
                      if (!project.hasProperty('SettingsBuilder')) {
                          // ทำการผูกคลาสเสมือนเพื่อให้โค้ดเก่าในแอปไม่แจ้ง Error ตัวแปรหาย
                          project.ext.SettingsBuilder = org.gradle.api.DefaultTask
                      }
                  }
              }
          }
          EOF

      # ปล่อยให้รันงานทั้งหมด (รวมถึง generateSettings) โดยใช้ Gradle 9.3.1 ตามที่ระบบบังคับ
      - name: Build Debug APK
        run: gradle assembleDebug -x lint --no-build-cache --no-configuration-cache

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RevolutionIRC-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
