name: Build Android APK

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ขยับขึ้นมาใช้ JDK 21 เพื่อให้รองรับ Gradle 9.3.1
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # สั่งติดตั้งและบังคับใช้ Gradle เวอร์ชัน 9.3.1 ตามที่ระบบร้องขอ
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      # รันคำสั่งบิวด์ตัวแอปพร้อมปิดการตรวจสอบบางอย่างเพื่อไม่ให้บิวด์พังระว่างทาง
      - name: Build Debug APK
        run: gradle assembleDebug -x lint --no-build-cache --no-configuration-cache

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RevolutionIRC-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
